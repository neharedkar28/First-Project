<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Incredible India</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="account-page">
    <div class="container account-shell">
        <header class="account-header">
            <a class="brand-mark" href="index.html">Incredible India</a>
            <nav class="account-nav">
                <a href="index.html">Home</a>
                <a href="signin.html">Sign In</a>
                <a href="profile.html">Profile</a>
            </nav>
        </header>

        <section class="account-card">
            <p class="section-tag">Create Account</p>
            <h2>Registration Form</h2>
            <p>This page gives the website a clear user registration flow without making the HTML difficult to follow.</p>

            <form class="booking-form">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label" for="register-name">Full Name</label>
                        <input id="register-name" class="form-control" type="text" placeholder="Enter your full name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="register-phone">Phone Number</label>
                        <input id="register-phone" class="form-control" type="tel" placeholder="Enter your phone number">
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="register-email">Email Address</label>
                        <input id="register-email" class="form-control" type="email" placeholder="Enter your email">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="register-password">Password</label>
                        <input id="register-password" class="form-control" type="password" placeholder="Create a password">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="register-confirm">Confirm Password</label>
                        <input id="register-confirm" class="form-control" type="password" placeholder="Confirm password">
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="register-interest">Preferred Destination</label>
                        <select id="register-interest" class="form-select">
                            <option>Taj Mahal</option>
                            <option>India Gate</option>
                            <option>Himachal Pradesh</option>
                            <option>Golden Temple</option>
                            <option>Gateway of India</option>
                            <option>Kerala</option>
                            <option>Jammu and Kashmir</option>
                            <option>Konkan</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-booking" type="submit">Register</button>
                    </div>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
