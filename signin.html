<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Incredible India</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="account-page">
    <div class="container account-shell">
        <header class="account-header">
            <a class="brand-mark" href="index.html">Incredible India</a>
            <nav class="account-nav">
                <a href="index.html">Home</a>
                <a href="profile.html">Profile</a>
                <a href="registration.html">Registration</a>
            </nav>
        </header>

        <section class="account-card">
            <p class="section-tag">Account Access</p>
            <h2>Sign in to manage your bookings</h2>
            <p>Use this page as the login screen for your project. It stays simple and readable for static website submission.</p>

            <form class="booking-form">
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label" for="signin-email">Email Address</label>
                        <input id="signin-email" class="form-control" type="email" placeholder="Enter your email">
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="signin-password">Password</label>
                        <input id="signin-password" class="form-control" type="password" placeholder="Enter your password">
                    </div>
                    <div class="col-12">
                        <button class="btn btn-booking" type="submit">Sign In</button>
                    </div>
                </div>
            </form>

            <div class="account-actions">
                <a class="secondary-link" href="registration.html">Create New Account</a>
                <a class="secondary-link" href="profile.html">View Sample Profile</a>
            </div>
        </section>
    </div>
</body>
</html>
